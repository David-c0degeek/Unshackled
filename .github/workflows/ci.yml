name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Prebuilt nextest binary; install-action does not build from source, so the
      # pinned 1.82 toolchain does not constrain the runner version.
      - uses: taiki-e/install-action@nextest
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Unit + integration tests via nextest. Fallback without nextest installed:
      # `cargo test --workspace`. nextest does not run doctests, so run those too.
      - run: cargo nextest run --workspace
      - run: cargo test --doc --workspace
      - run: cargo check --workspace
      # The vendored LocalMind engine is its own workspace; run its suite so a
      # broken vendored test fails this build and the pinned commit's behavior
      # stays verified on every OS.
      - run: cargo nextest run --workspace --manifest-path external/localmind/Cargo.toml
      - run: cargo test --doc --workspace --manifest-path external/localmind/Cargo.toml
      # The interactive TUI (`chat`) is behind an opt-in feature; lint and build
      # it here so the terminal driver is covered on every OS.
      - run: cargo clippy -p localpilot --features tui,learning --all-targets -- -D warnings
      - run: cargo build -p localpilot --features tui,learning

  coverage:
    name: coverage (line floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      # Line-coverage floor over the workspace. The floor is a ratchet: set
      # from the measured baseline, raised deliberately, never lowered to
      # admit a regression.
      - run: cargo llvm-cov nextest --workspace --fail-under-lines 75
      - run: cargo llvm-cov report --lcov --output-path coverage.lcov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
          retention-days: 14

  supply-chain:
    name: supply-chain (advisories, licenses, bans, unused deps)
    runs-on: ubuntu-latest
    # Blocking before the v1 release (docs/14 §4, docs/09 release checklist).
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit,cargo-machete
      - run: cargo deny check
      - run: cargo audit
      - run: cargo machete

  lockfile-guard:
    name: lockfile guard (no unexplained Cargo.lock drift)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # A Cargo.lock change without a matching manifest change means a
      # dependency moved without a deliberate decision (docs/13 §1: pins are
      # exact; bumps are their own commit). Surface it as a failure so the
      # change is explained, not silent.
      - name: fail on lockfile-only dependency drift
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed="$(git diff --name-only "$base"...HEAD)"
          if echo "$changed" | grep -qx "Cargo.lock"; then
            if ! echo "$changed" | grep -q "Cargo.toml"; then
              echo "Cargo.lock changed without any Cargo.toml change."
              echo "Dependency moves must come from a manifest decision."
              exit 1
            fi
          fi

  install-smoke:
    name: clean-environment install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
      - uses: Swatinem/rust-cache@v2
      # Install exactly what a user would get, from the locked graph, into a
      # fresh root; then prove the produced binary runs.
      - run: cargo install --path crates/localpilot-cli --locked --root "$RUNNER_TEMP/install-smoke"
      - run: '"$RUNNER_TEMP/install-smoke/bin/localpilot" --help'
