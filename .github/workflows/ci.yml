name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Prebuilt nextest binary; install-action does not build from source, so the
      # pinned 1.82 toolchain does not constrain the runner version.
      - uses: taiki-e/install-action@nextest
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Unit + integration tests via nextest. Fallback without nextest installed:
      # `cargo test --workspace`. nextest does not run doctests, so run those too.
      - run: cargo nextest run --workspace
      - run: cargo test --doc --workspace
      - run: cargo check --workspace
      # The interactive TUI (`chat`) is behind an opt-in feature; lint and build
      # it here so the terminal driver is covered on every OS.
      - run: cargo clippy -p unshackled --features tui --all-targets -- -D warnings
      - run: cargo build -p unshackled --features tui

  supply-chain:
    name: supply-chain (advisories, licenses, bans, unused deps)
    runs-on: ubuntu-latest
    # Blocking before the v1 release (docs/14 §4, docs/09 release checklist).
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit,cargo-machete
      - run: cargo deny check
      - run: cargo audit
      - run: cargo machete
