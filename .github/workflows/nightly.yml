name: nightly

# Post-alpha iteration pipeline: builds main on a schedule with no stability
# guarantee (docs/09 Release Channels). Artifacts are retained briefly for
# testing, not published as a release.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    name: nightly build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked -p localpilot --features tui,learning
      - uses: actions/upload-artifact@v7
        with:
          name: localpilot-nightly-${{ matrix.os }}
          path: |
            target/release/localpilot
            target/release/localpilot.exe
          if-no-files-found: ignore
          retention-days: 7
