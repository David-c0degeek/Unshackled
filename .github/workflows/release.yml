name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  archives:
    name: archive (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked -p localpilot --features tui,learning
      # Stage the binary alongside the license files so every archive ships them.
      - name: stage (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/localpilot
          cp target/release/localpilot dist/localpilot/
          cp LICENSE-MIT README.md CHANGELOG.md dist/localpilot/
          tar -C dist -czf localpilot-${{ matrix.target }}.tar.gz localpilot
      - name: stage (windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force dist/localpilot | Out-Null
          Copy-Item target/release/localpilot.exe dist/localpilot/
          Copy-Item LICENSE-MIT, README.md, CHANGELOG.md dist/localpilot/
          Compress-Archive -Path dist/localpilot/* -DestinationPath localpilot-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v7
        with:
          name: localpilot-${{ matrix.target }}
          path: localpilot-${{ matrix.target }}.${{ matrix.ext }}
