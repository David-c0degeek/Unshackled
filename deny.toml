# Supply-chain policy (docs/13 §1-2, §8). Every workspace dependency is
# exact-pinned (`=x.y.z`) in the root `[workspace.dependencies]` and referenced by
# members with `dep = { workspace = true }`; there is no second pin in a member
# crate. New dependencies must pass `cargo deny check` and `cargo audit` before
# use. Run `cargo deny check` as part of the pre-release gate.

[advisories]
# RustSec advisory database. Advisories are normally resolved by upgrading, not
# ignoring. Each entry below is a deep transitive we do not control directly,
# flagged only as unmaintained (no known vulnerability), kept until the parent
# crate (rustls/reqwest) drops it.
ignore = [
    # rustls-pemfile is unmaintained; pulled transitively via rustls. No known
    # vulnerability — an advisory of category "unmaintained" only.
    "RUSTSEC-2025-0134",
    # paste is unmaintained; pulled transitively via ratatui. No known
    # vulnerability — an "unmaintained" advisory only.
    "RUSTSEC-2024-0436",
]

[licenses]
# Permissive licenses only. A dependency under any other license is a blocker and
# must be replaced or its inclusion justified here.
# CDLA-Permissive-2.0 is the license of webpki-roots, which bundles Mozilla's CA
# certificate data used for TLS to official provider APIs; it is a permissive
# data license, not a copyleft code license.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    # Zlib is a permissive license used by a ratatui transitive (e.g. foldhash).
    "Zlib",
]

[bans]
# Duplicate versions are tolerated (warn) while the tree is small; tighten to
# "deny" before release once the graph stabilizes.
multiple-versions = "warn"
# Internal `{ path = ... }` members carry no version and read as wildcards;
# `allow-wildcard-paths` does not exempt them while the crates remain publishable.
# Keep this at "warn" until the publish posture is settled at release (subject 09),
# then tighten to "deny" alongside `publish = false` on internal crates.
wildcards = "warn"
allow-wildcard-paths = true

[sources]
# Crates come from crates.io only. An unknown registry or git source is a blocker
# until explicitly allow-listed here with justification.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
